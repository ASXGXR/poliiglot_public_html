<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Poliiglot</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/register.css">
  <script src="js/register.js" defer></script>
</head>
<body>

  <img class="register-logo" src="images/poliiglot-logo.svg">

  <div class="signup-container">
    <h1>Create Your Account</h1>
    <div class="horiz-line"></div>

    <!-- Features Section -->
    <ul class="features">
      <li>🌍 Region-specific Translations</li>
      <li>💱 Currency Conversion</li>
      <li>💬 Useful Phrases & Translations</li>
    </ul>

    <form id="signup-form">
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>
      
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>

      <button type="submit" class="signup-btn">Sign Up</button>

    </form>
    <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>
  </div>

</body>
</html>
