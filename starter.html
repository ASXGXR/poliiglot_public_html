<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poliiglot</title>
  <!-- STYLES -->
  <link rel="stylesheet" href="css/style.css" class="css-loader">
  <link rel="stylesheet" href="css/starter.css" class="css-loader">
  <!-- SCRIPTS -->
  <script src="js/starter.js" defer></script>
  <!-- Preconnect to external resources -->
  <link rel="icon" href="images/favicon.ico" type="image/x-icon" />  
</head>


<body>
  <div class="map-wrapper">
    <img class="map" src="images/world-map.jpg" alt="Map of the world">
    <img class="mascot" src="images/mascot.png" alt="Mascot">
  </div>
  <div class="start-wrapper">
    <h2>Hey There! Where's Your Next Planned Holiday/Trip?</h2>
    <div class="dest-input-wrapper">
      <input class="dest-input" type="text" placeholder="Enter Country or City...">
      <button class="confirm-btn">Confirm</button>
    </div>
  </div>
</body>
